<!DOCTYPE html>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: #00ff33;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .login-container {
            background-color: rgba(10, 10, 10, 0.9);
            border: 2px solid #00ff33;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            padding: 40px;
            border-radius: 5px;
            text-align: center;
            max-width: 530px;
            width: 90%;
            z-index: 3;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 51, 0.5);
        }

        .description-top {
            color: #88ff99;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 35px;
        }

        .access-btn-wrapper {
            display: none;
            justify-content: center;
            margin: 20px 0 35px 0;
        }

        .access-btn {
            background-color: #00ff33;
            color: #050505;
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.6);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .access-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 0 25px #ffffff;
            transform: scale(1.05);
        }

        .description-bottom {
            color: #a0a0a0;
            font-size: 0.95rem;
            line-height: 1.8;
            border-top: 1px dashed #00ff33;
            padding-top: 25px;
        }

        .contact-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }

        .contact-method {
            display: inline-flex;
            align-items: center;
            color: #00ff33;
            text-decoration: none;
            background: rgba(0, 255, 51, 0.05);
            padding: 6px 12px;
            border: 1px solid rgba(0, 255, 51, 0.3);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .contact-method:hover {
            color: #ffffff;
            background: rgba(0, 255, 51, 0.15);
            box-shadow: 0 0 10px rgba(0, 255, 51, 0.3);
            border-color: #00ff33;
        }

        .logo-img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            object-fit: contain;
            border-radius: 3px;
        }

        #status-msg {
            margin-top: 20px;
            padding: 10px;
            display: none;
            font-weight: bold;
        }
        .error { color: #ff3333; border: 1px solid #ff3333; }
        .success { color: #33ff33; border: 1px solid #33ff33; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>IES AH Unblocked Games</h1>
        
        <p class="description-top">> Inicia sesión con google para acceder</p>

        <div class="google-btn-wrapper" id="google-login-section">

                 data-client_id="1062993851355-d81aamrl6k51u9hic513gep2e1qdu5sk.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse">
            </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="dark"
                 data-text="signin_with"

        </div>

        <div class="access-btn-wrapper" id="access-section">
            <button class="access-btn" onclick="inicializarAcceso()">[ Entrar ]</button>
        </div>

        <div id="status-msg"></div>

        <div class="description-bottom">
            Para conseguir acceso, contáctame en:
            <div class="contact-group">

                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="logo-img"> 
                    +34 722 573 462
                </a> 
                <div class="contact-method">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/006/892/625/small/discord-logo-icon-editorial-free-vector.jpg" alt="Discord" class="logo-img"> 
                    mugen_cheeky
                </div>
            </div>
        </div>
    </div>

    <script>
        const STRICT_WHITELIST_MODE = true; 
        
        const whitelist = [
            "jmpardusjr@gmail.com",
            "jmpardot04@iesarroyoharnina.es",
            "bassouli01@iesarroyoharnina.es",
            "cguerreroa02@iesarroyoharnina.es",
            "fmunnozs03@iesarroyoharnina.es",
            "noudao02@santiagoapostol.net",
            "guillenmachiocesar@gmail.com",
            "jmgarciam11@iesarroyoharnina.es"
        ];

        const blacklist = [
            "troll@gmail.com"
        ];

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            const userEmail = responsePayload.email;
            
            const statusBox = document.getElementById("status-msg");
            const googleSection = document.getElementById("google-login-section");
            const accessSection = document.getElementById("access-section");
            
            statusBox.style.display = "block";

            if (blacklist.includes(userEmail)) {
                statusBox.className = "error";
                statusBox.innerText = `ACCESO DENEGADO: Tu correo (${userEmail}) está baneado.`;
                return;
            }

            if (STRICT_WHITELIST_MODE) {
                if (whitelist.includes(userEmail)) {
                    statusBox.className = "success";
                    statusBox.innerText = `¡Sesión autorizada! Pulsa el botón para continuar.`;
                    
                    googleSection.style.display = "none";
                    accessSection.style.display = "flex";
                } else {
                    statusBox.className = "error";
                    statusBox.innerText = `ACCESO DENEGADO: El correo ${userEmail} no está en la lista blanca.`;
                }
            } else {
                statusBox.className = "success";
                statusBox.innerText = `Acceso Concedido.`;
                googleSection.style.display = "none";
                accessSection.style.display = "flex";
            }
        }

        function inicializarAcceso() {
            const newWindow = window.open('about:blank', '_blank');
    
            if (newWindow) {
                const doc = newWindow.document;
                
                doc.body.style.margin = '0';
                doc.body.style.padding = '0';
                doc.body.style.height = '100vh';
                doc.body.style.overflow = 'hidden';
                
                const iframe = doc.createElement('iframe');
                
                const secreto = "aHR0cHM6Ly9lZHVyb2Nrcy5vcmcvZ3htZXMuaHRtbA==";
                iframe.src = window.atob(secreto);
                
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                
                doc.body.appendChild(iframe);
            } else {
                alert('Por favor, permite las ventanas emergentes (pop-ups) en tu navegador.');
            }
        }
    </script>
</body>
